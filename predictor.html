<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Filter tabs row (branch) ── */
    .branch-tab-row {
      display:flex;overflow-x:auto;gap:7px;
      padding:0 0 4px;margin:.5rem 0 .75rem;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;
    }
    .branch-tab-row::-webkit-scrollbar{display:none;}
    .btab{
      flex:0 0 auto;padding:.36rem .88rem;border-radius:var(--r-full);
      background:rgba(30,41,59,.7);border:1px solid var(--border);
      font-size:.74rem;font-weight:700;color:var(--text-3);
      cursor:pointer;transition:var(--transition);font-family:inherit;
    }
    .btab.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:var(--glow-blue);}
    .btab:hover:not(.active){background:rgba(37,99,235,.15);color:var(--blue-200);}

    /* ── Rank input row ── */
    .rank-row{display:flex;gap:.55rem;align-items:stretch;margin-bottom:.65rem;}
    .rank-row .rank-wrap{flex:1;position:relative;}
    .rank-row .rank-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;}
    #rank{
      width:100%;padding:.8rem .75rem .8rem 2.25rem;
      border:1.5px solid var(--border);border-radius:var(--r-md);
      background:rgba(15,23,42,.85);color:var(--text-1);
      font-size:1.05rem;font-weight:700;font-family:inherit;
      transition:border-color .18s,box-shadow .18s;
    }
    #rank::placeholder{color:var(--text-3);font-weight:400;font-size:.9rem;}
    #rank:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.2);}
    #rank.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.15);}
    .go-btn{
      background:var(--primary-g);color:white;border:none;border-radius:var(--r-md);
      padding:.8rem 1.15rem;font-weight:800;font-size:.9rem;font-family:inherit;
      cursor:pointer;box-shadow:var(--glow-blue);transition:transform .18s,box-shadow .18s;
      flex-shrink:0;white-space:nowrap;
    }
    .go-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.5);}
    .go-btn:active{transform:scale(.97);}
    .go-btn:disabled{opacity:.5;transform:none;box-shadow:none;}

    /* ── Category select ── */
    .cat-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.85rem;}
    .cat-row label{font-size:.7rem;font-weight:700;color:var(--text-3);
      text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0;}
    #category{
      flex:1;padding:.65rem .75rem;border:1.5px solid var(--border);border-radius:var(--r-sm);
      background:rgba(15,23,42,.85);color:var(--text-1);font-size:.88rem;
      font-family:inherit;font-weight:600;cursor:pointer;
    }
    #category:focus{outline:none;border-color:var(--primary);}
    #category option{background:#1e293b;color:var(--text-1);}

    /* ── Result card (stock app style) ── */
    .result-card{
      background:linear-gradient(145deg,#1a2438,#0f1a2e);
      border:1px solid rgba(99,130,190,.14);
      border-radius:14px;padding:12px 13px;
      display:flex;justify-content:space-between;align-items:center;
      gap:.6rem;box-shadow:0 2px 10px rgba(0,0,0,.4);
      animation:card-in .25s var(--ease) both;
      transition:transform .2s,box-shadow .2s,border-color .2s;
      cursor:default;margin-bottom:.45rem;
    }
    .result-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5);border-color:rgba(99,130,190,.3);}
    .result-card.best{border:1.5px solid rgba(37,99,235,.5);background:linear-gradient(145deg,#1a2d4d,#0c1a38);}
    @keyframes card-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    .college-info{flex:1;min-width:0;}
    .college-info h3{font-size:.875rem;font-weight:700;color:var(--text-1);
      line-height:1.25;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .college-info .meta{font-size:.7rem;color:var(--text-3);font-weight:500;}

    .best-label{display:inline-block;font-size:.6rem;font-weight:800;
      color:var(--blue-200);background:rgba(37,99,235,.2);
      padding:2px 7px;border-radius:4px;margin-bottom:4px;letter-spacing:.06em;}
    .tier-badge{display:inline-block;font-size:.62rem;font-weight:700;
      padding:2px 7px;border-radius:4px;
      background:rgba(100,116,139,.15);color:var(--text-3);
      border:1px solid rgba(99,130,190,.12);margin-bottom:4px;}

    /* right-side metrics */
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
    .cutoff-num{font-size:.78rem;font-weight:700;color:var(--text-2);letter-spacing:-.01em;}
    .cutoff-lbl{font-size:.6rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
    .badge{
      display:inline-flex;flex-direction:column;align-items:center;
      padding:5px 10px;border-radius:20px;
      font-size:.68rem;font-weight:800;text-transform:uppercase;
      white-space:nowrap;flex-shrink:0;gap:1px;letter-spacing:.04em;
      min-width:56px;text-align:center;
    }
    .badge .pct{font-size:.82rem;font-weight:800;text-transform:none;letter-spacing:-.01em;}
    .safe    {background:rgba(34,197,94,.14); color:#22c55e; border:1px solid rgba(34,197,94,.3);}
    .target  {background:rgba(245,158,11,.14);color:#f59e0b; border:1px solid rgba(245,158,11,.3);}
    .moderate{background:rgba(245,158,11,.14);color:#f59e0b; border:1px solid rgba(245,158,11,.3);}
    .dream   {background:rgba(239,68,68,.14); color:#ef4444; border:1px solid rgba(239,68,68,.3);}

    .bookmark-btn{background:none;border:none;cursor:pointer;font-size:.95rem;
      padding:3px;color:var(--text-3);transition:color .18s,transform .18s;flex-shrink:0;}
    .bookmark-btn:hover{color:#f59e0b;transform:scale(1.2);}
    .bookmark-btn.saved{color:#f59e0b;}

    /* cutoff bar */
    .cutoff-bar-wrap{margin-top:5px;}
    .cutoff-bar-track{height:3px;background:rgba(100,116,139,.2);border-radius:99px;overflow:hidden;margin-top:3px;}
    .cutoff-bar-fill{height:100%;border-radius:99px;transition:width .6s var(--ease);}
    .cutoff-bar-labels{display:flex;justify-content:space-between;font-size:.6rem;color:var(--text-3);font-weight:600;margin-top:2px;}

    /* section titles */
    .section-title{font-size:.7rem;font-weight:800;margin:14px 0 7px;
      text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:1px;background:rgba(99,130,190,.12);}
    .section-safe{color:#22c55e;}
    .section-target{color:#f59e0b;}
    .section-dream{color:#ef4444;}

    /* header + insight */
    .result-header{background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);
      border-radius:var(--r-sm);padding:8px 12px;font-size:.8rem;margin-bottom:9px;
      font-weight:600;color:var(--blue-200);}
    .insight-box{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.15);
      padding:9px 12px;border-radius:var(--r-sm);font-size:.78rem;color:var(--blue-200);
      margin-bottom:10px;font-weight:500;line-height:1.55;}

    /* summary strip */
    .summary-strip{display:flex;gap:.45rem;margin-bottom:.75rem;}
    .summary-pill{flex:1;text-align:center;border-radius:var(--r-md);
      padding:.55rem .3rem;font-size:.68rem;font-weight:700;border:1px solid;}
    .summary-pill.safe    {background:rgba(34,197,94,.12);   color:#22c55e;border-color:rgba(34,197,94,.3);}
    .summary-pill.moderate{background:rgba(245,158,11,.12);  color:#f59e0b;border-color:rgba(245,158,11,.3);}
    .summary-pill.dream   {background:rgba(239,68,68,.12);   color:#ef4444;border-color:rgba(239,68,68,.3);}
    .summary-pill .count{display:block;font-size:1.1rem;font-weight:800;letter-spacing:-.02em;}

    /* loading */
    .loading-box{text-align:center;padding:2rem 1.25rem;background:linear-gradient(145deg,#1e293b,#0f172a);
      border:1px solid var(--border);border-radius:var(--r-lg);}
    .load-title{font-weight:700;font-size:.95rem;color:var(--text-1);margin-bottom:5px;}
    .load-sub{font-size:.78rem;color:var(--text-3);}
    .load-dots span{display:inline-block;width:8px;height:8px;background:var(--primary);
      border-radius:50%;margin:10px 3px 0;animation:dot-pulse .9s ease-in-out infinite;}
    .load-dots span:nth-child(2){animation-delay:.2s;}
    .load-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes dot-pulse{0%,80%,100%{transform:scale(.65);opacity:.4;}40%{transform:scale(1);opacity:1;}}

    /* no results */
    .no-results{text-align:center;padding:2.5rem 1.25rem;color:var(--text-3);
      font-weight:600;background:linear-gradient(145deg,#1e293b,#0f172a);
      border-radius:var(--r-md);border:1px dashed rgba(99,130,190,.2);line-height:1.7;}

    .import-banner{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.28);
      border-radius:var(--r-md);padding:.65rem .9rem;margin-bottom:.75rem;
      font-size:.8rem;color:var(--blue-200);font-weight:600;
      display:flex;align-items:center;gap:8px;}
    .disclaimer{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);
      border-radius:var(--r-sm);padding:.75rem .9rem;font-size:.73rem;
      color:#f59e0b;font-weight:500;line-height:1.55;margin-top:.75rem;}
    .cta-bottom{text-align:center;font-size:.8rem;color:var(--text-3);
      margin-top:1rem;padding-top:.85rem;border-top:1px dashed rgba(99,130,190,.15);}
    .cta-bottom a{color:var(--primary);font-weight:700;text-decoration:none;}

    @keyframes spin{to{transform:rotate(360deg);}}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);
      border-top-color:white;border-radius:50%;
      animation:spin .65s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px;}
  </style>

<script src="final_colleges.js"></script>
<script>
  /* ── Selected branch ── */
  let selectedBranch = 'ALL';
  function setBranch(val, el) {
    selectedBranch = val;
    document.querySelectorAll('.btab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  /* ── Auto-set branch from URL ── */
  (function() {
    const p = new URLSearchParams(window.location.search).get('branch');
    if (p) {
      selectedBranch = p.toUpperCase();
      document.querySelectorAll('.btab').forEach(b => {
        if (b.textContent.trim() === selectedBranch ||
            b.getAttribute('onclick').includes(`'${selectedBranch}'`)) {
          b.classList.add('active');
        } else {
          b.classList.remove('active');
        }
      });
    }
  })();

  /* ── Probability engine ── */
  const bookmarks = new Set();

  function calcProbability(rank, cutoff) {
    if (!cutoff || cutoff <= 0) return 0;
    const ratio = rank / cutoff;
    let chance;
    if (ratio <= 1) {
      chance = 95 - (ratio * 45);   // range ~50% to 95%
    } else {
      chance = Math.max(10, 50 - ((ratio - 1) * 60));  // sharp drop
    }
    // Clamp between 10 and 95
    return Math.min(95, Math.max(10, Math.round(chance)));
  }

  /* ── Compute tier from minimum GM cutoff of the college (done at runtime) ── */
  function computeTier(collegeName) {
    const collegeEntries = collegeData.filter(c => c.name === collegeName && c.cutoff > 0);
    if (collegeEntries.length === 0) return { tier: 5, tierLabel: '📍 Tier 5' };
    const minCutoff = Math.min(...collegeEntries.map(c => c.cutoff));
    if (minCutoff < 5000)            return { tier: 1, tierLabel: '🏆 Tier 1' };
    if (minCutoff < 15000)           return { tier: 2, tierLabel: '⭐ Tier 2' };
    if (minCutoff < 30000)           return { tier: 3, tierLabel: '✅ Tier 3' };
    if (minCutoff < 60000)           return { tier: 4, tierLabel: '📊 Tier 4' };
    return                           { tier: 5, tierLabel: '📍 Tier 5' };
  }

  function getCat(chance) {
    if (chance >= 70) return { label:'SAFE',     css:'safe'     };
    if (chance >= 40) return { label:'MODERATE', css:'moderate' };
    return                   { label:'DREAM',    css:'dream'    };
  }

  /* ── Cutoff bar ── */
  function cutoffBar(rank, cutoff, css) {
    const pct = Math.min(100, Math.round((rank / cutoff) * 100));
    const cols = { safe:'#22c55e', target:'#f59e0b', moderate:'#f59e0b', dream:'#ef4444' };
    return `<div class="cutoff-bar-wrap">
      <div class="cutoff-bar-track">
        <div class="cutoff-bar-fill" style="width:${pct}%;background:${cols[css]||'#94a3b8'}"></div>
      </div>
      <div class="cutoff-bar-labels">
        <span>Rank ${rank.toLocaleString('en-IN')}</span>
        <span>Cutoff ${cutoff.toLocaleString('en-IN')}</span>
      </div>
    </div>`;
  }

  /* ── Render card ── */
  function renderCard(item, isBest, rank) {
    const bkSaved = bookmarks.has(item.name + item.branch) ? 'saved' : '';
    return `
      <div class="result-card ${isBest ? 'best' : ''}">
        <div class="college-info">
          ${isBest ? '<div class="best-label">⭐ BEST MATCH</div>' : ''}
          <div class="tier-badge">${item.tierLabel || '📍 College'}</div>
          <h3>${item.name}</h3>
          <div class="meta">${item.branch}</div>
          ${cutoffBar(rank, item.categoryCutoff, item.css)}
        </div>
        <div class="card-right">
          <div>
            <div class="cutoff-num">${item.categoryCutoff.toLocaleString('en-IN')}</div>
            <div class="cutoff-lbl">Cutoff</div>
          </div>
          <div class="badge ${item.css}">
            <span class="pct">${item.chance}%</span>
            <span>${item.label}</span>
          </div>
          <button class="bookmark-btn ${bkSaved}"
            onclick="toggleBookmark('${item.name}','${item.branch}',this)" title="Save">🔖</button>
        </div>
      </div>`;
  }

  function buildSection(title, cssClass, data, rank, isFirst) {
    if (!data.length) return '';
    return `<div class="section-title ${cssClass}">${title}</div>`
      + data.map((c, i) => renderCard(c, isFirst && i === 0, rank)).join('');
  }

  function renderResults(results, rank, branchLabel, catChoice) {
    const c = document.getElementById('results-container');
    if (!results.length) {
      c.innerHTML = `<div class="no-results">😔 No colleges found for rank <b>${rank.toLocaleString('en-IN')}</b>.<br><small>Try "All" branch or a different category.</small></div>`;
      return;
    }
    // Count by category for summary strip
    const safeAll     = results.filter(r => r.chance >= 70);
    const moderateAll = results.filter(r => r.chance >= 40 && r.chance < 70);
    const dreamAll    = results.filter(r => r.chance < 40);

    // Best pick = first in the sorted display order (moderate first)
    const best = results[0];

    let html = `
      <div class="summary-strip">
        <div class="summary-pill moderate"><span class="count">${moderateAll.length}</span>Moderate</div>
        <div class="summary-pill dream"><span class="count">${dreamAll.length}</span>Dream</div>
        <div class="summary-pill safe"><span class="count">${safeAll.length}</span>Safe</div>
      </div>
      <div class="result-header">
        🎯 Rank <b>${rank.toLocaleString('en-IN')}</b> &nbsp;•&nbsp; ${branchLabel} &nbsp;•&nbsp; ${catChoice}
      </div>
      <div class="insight-box">
        💡 Top result: <b>${best.name} (${best.branch})</b><br>
        Cutoff range: <b>${Math.round(best.categoryCutoff*0.9).toLocaleString('en-IN')} – ${best.categoryCutoff.toLocaleString('en-IN')}</b>
      </div>`;

    // Sorting: MODERATE first, DREAM second, SAFE last — ascending chance within each group
    const moderate = results.filter(r => r.chance >= 40 && r.chance < 70).sort((a,b) => a.chance - b.chance);
    const dream    = results.filter(r => r.chance < 40).sort((a,b) => a.chance - b.chance);
    const safe     = results.filter(r => r.chance >= 70).sort((a,b) => a.chance - b.chance);

    html += buildSection('🟡 MODERATE OPTIONS', 'section-target', moderate, rank, true);
    html += buildSection('🔴 DREAM OPTIONS',    'section-dream',  dream,    rank, false);
    html += buildSection('🟢 SAFE OPTIONS',     'section-safe',   safe,     rank, false);

    html += `
      <div class="disclaimer">⚠️ Probability estimates based on previous year data. Actual cutoffs may vary with 2026 seat matrix &amp; demand.</div>
      <div class="cta-bottom">📋 Explore cutoffs → <a href="cutoffs.html">Cutoffs Tab</a></div>`;

    c.innerHTML = html;
    setTimeout(() => c.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
  }

  /* ── Main prediction ── */
  function runPrediction() {
    const rankEl   = document.getElementById('rank');
    const catEl    = document.getElementById('category');
    const c        = document.getElementById('results-container');
    const loading  = document.getElementById('loading');
    const btn      = document.getElementById('predictBtn');
    const rank     = parseInt(rankEl.value);
    const catChoice = catEl.value;

    if (!rank || rank <= 0 || rank > 300000) {
      rankEl.classList.add('error');
      c.innerHTML = `<div class="no-results">⚠️ Enter a valid KCET rank (1 – 3,00,000).</div>`;
      return;
    }
    rankEl.classList.remove('error');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyzing…';
    c.innerHTML = ''; loading.style.display = 'block';

    const branchLabel = selectedBranch === 'ALL' ? 'All Branches' : selectedBranch;

    setTimeout(() => {
      // Build all scored results
      const allScored = collegeData
        .map(col => {
          let catCutoff = catChoice === 'GM' ? col.cutoff : (col[catChoice] || 0);
          if (!catCutoff || catCutoff <= 0) catCutoff = col.cutoff; // Fallback to GM if missing
          if (!catCutoff) return null;
          const branchOk = selectedBranch === 'ALL' || col.branch === selectedBranch;
          if (!branchOk) return null;
          const chance = calcProbability(rank, catCutoff);
          if (chance < 10) return null;          // filter out useless results
          const tierInfo = computeTier(col.name); // dynamic tier from GM CSE
          return { ...col, categoryCutoff: catCutoff, chance, tierLabel: tierInfo.tierLabel, ...getCat(chance) };
        })
        .filter(Boolean);

      // Sort: MODERATE first → DREAM → SAFE; ascending chance within each group
      const moderate = allScored.filter(r => r.chance >= 40 && r.chance < 70).sort((a,b) => a.chance - b.chance);
      const dream    = allScored.filter(r => r.chance < 40).sort((a,b) => a.chance - b.chance);
      const safe     = allScored.filter(r => r.chance >= 70).sort((a,b) => a.chance - b.chance);
      const sorted   = [...moderate, ...dream, ...safe].slice(0, 10);

      loading.style.display = 'none';
      renderResults(sorted, rank, branchLabel, catChoice);
      btn.disabled = false;
      btn.innerHTML = 'Analyze →';
    }, 1000);
  }

  /* ── Bookmarks ── */
  function toggleBookmark(name, branch, btn) {
    const key = name + branch;
    if (bookmarks.has(key)) { bookmarks.delete(key); btn.classList.remove('saved'); }
    else { bookmarks.add(key); btn.classList.add('saved'); }
  }

  /* ── URL params auto-fill ── */
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('rank').addEventListener('keydown', e => {
      if (e.key === 'Enter') runPrediction();
    });
    const params = new URLSearchParams(window.location.search);
    const urlRank = params.get('rank');
    if (urlRank && !isNaN(parseInt(urlRank))) {
      document.getElementById('rank').value = parseInt(urlRank);
      const banner = document.createElement('div');
      banner.className = 'import-banner';
      banner.innerHTML = `🔢 Rank <strong>~${parseInt(urlRank).toLocaleString('en-IN')}</strong> imported from Marks → Rank tool`;
      const fc = document.getElementById('form-card');
      fc.insertBefore(banner, fc.firstChild);
      setTimeout(() => runPrediction(), 350);
    }
  });
</script>
</body>
